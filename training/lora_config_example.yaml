# sLLM LoRA/QLoRA 실험 설정 예시
# 실제 학습 전 GPU 메모리, 라이선스, 모델 접근 권한을 확인해야 한다.

base_model: Qwen/Qwen2.5-0.5B-Instruct
# 한국어 성능을 더 중시한다면 아래 후보도 검토 가능
# base_model: "beomi/KoAlpaca-Polyglot-5.8B"
# base_model: "MLP-KTLim/llama-3-Korean-Bllossom-8B"

dataset_path: "training/sample_lora_dataset.jsonl"
output_dir: "training/outputs/policy-lora"

max_seq_length: 1024
train_batch_size: 1
gradient_accumulation_steps: 8
num_train_epochs: 2
learning_rate: 0.0002
warmup_ratio: 0.03
weight_decay: 0.01
max_grad_norm: 0.3
logging_steps: 5
save_steps: 50

# LoRA 설정
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# QLoRA 설정
use_4bit: true
bnb_4bit_compute_dtype: "float16"
bnb_4bit_quant_type: "nf4"
bnb_4bit_use_double_quant: true

# 실험 목적
# - 정책 내용을 모델에 암기시키기보다, 조건 추출/자격 판단/답변 형식 정규화를 보조하는 sLLM을 만든다.
# - 최신 정책 정보는 RAG, Vector DB, 공식 출처 fallback을 통해 유지한다.
